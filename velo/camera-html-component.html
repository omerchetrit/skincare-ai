<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #000; display: flex; flex-direction: column; align-items: center; }
  video { width: 100%; max-width: 480px; border-radius: 12px; transform: scaleX(-1); }
  .controls { display: flex; gap: 16px; margin-top: 12px; }
  .btn-snap {
    width: 64px; height: 64px; border-radius: 50%; border: 4px solid #fff;
    background: #c9836a; font-size: 24px; cursor: pointer;
  }
  .btn-cancel {
    padding: 10px 20px; border-radius: 24px; border: 2px solid #fff;
    background: transparent; color: #fff; font-size: 14px; cursor: pointer;
    align-self: center;
  }
  canvas { display: none; }
</style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button class="btn-snap" id="btnSnap">📸</button>
    <button class="btn-cancel" id="btnCancel">ביטול</button>
  </div>

  <script>
    let stream = null;

    window.onmessage = async (e) => {
      if (e.data.type === 'startCamera') {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
            audio: false,
          });
          document.getElementById('video').srcObject = stream;
        } catch (err) {
          window.parent.postMessage({ type: 'cancel' }, '*');
        }
      }
    };

    document.getElementById('btnSnap').addEventListener('click', () => {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      stopCamera();
      window.parent.postMessage({ type: 'photo', dataUrl }, '*');
    });

    document.getElementById('btnCancel').addEventListener('click', () => {
      stopCamera();
      window.parent.postMessage({ type: 'cancel' }, '*');
    });

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
    }
  </script>
</body>
</html>
